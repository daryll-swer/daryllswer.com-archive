name: Canonical drift check

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      force:
        description: "Bypass frozen_archive no-op for manual recovery verification"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: canonical-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Check canonical drift
        run: |
          args=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            args="--force"
          fi
          python3 scripts/check-canonical-drift.py $args

      - name: Read archive state
        id: archive-state
        run: |
          state="$(python3 -c 'import json; print(json.load(open("archive-status.json", encoding="utf-8")).get("state", ""))')"
          echo "state=$state" >> "$GITHUB_OUTPUT"

      - name: Validate public archive
        if: steps.archive-state.outputs.state != 'frozen_archive'
        run: |
          make validate
          make scan-secrets

      - name: Commit drift status changes
        run: |
          if git diff --quiet -- archive-status.json docs/CANONICAL_DRIFT.md; then
            echo "No drift status changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add archive-status.json docs/CANONICAL_DRIFT.md
          git commit -m "Record canonical drift check"
          git push
